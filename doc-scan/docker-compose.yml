version: "3.8"

services:
  guardly-scanner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guardly-document-scanner
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3001/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Run with: docker-compose up -d
# Stop with: docker-compose down
# View logs: docker-compose logs -f
